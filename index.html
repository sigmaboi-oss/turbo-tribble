<!DOCTYPE html>
<html>
<head>
<style>
    * { box-sizing: border-box; }
    html, body {
        background: transparent !important; 
        margin: 0; padding: 5px; /* Tiny padding so cards don't touch edges */
        width: 100%; overflow: hidden;
        font-family: 'Segoe UI', Arial, sans-serif;
    }

    #memberList { display: flex; flex-direction: column; gap: 8px; }

    .member-card {
        display: flex; align-items: center; gap: 10px; padding: 10px;
        background: rgba(255, 60, 0, 0.05);
        border: 1px solid rgba(255, 60, 0, 0.15);
        border-radius: 12px; color: #eee; text-decoration: none;
        transition: 0.3s ease;
    }

    .member-card:hover {
        background: rgba(255, 60, 0, 0.15);
        border-color: #ff3c00;
        transform: translateX(5px);
    }

    .avatar-wrapper { position: relative; }
    .avatar { width: 38px; height: 38px; border-radius: 50%; border: 1px solid #ff3c00; }
    
    /* 🟢 PULSING ONLINE DOT */
    .status-dot { position: absolute; bottom: 1px; right: 1px; width: 10px; height: 10px; border-radius: 50%; border: 1.5px solid #000; }
    .online { background: #00ff00; }
    .online::after {
        content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        border-radius: 50%; background: #00ff00; animation: statusPulse 2s infinite;
    }
    @keyframes statusPulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }
    .offline { background: #555; }
    
    .username { font-weight: bold; font-size: 13px; color: #fff; }
    .rating-text { font-size: 10px; color: #ffae00; }
</style>
</head>
<body>
    <div id="memberList"></div>

    <script>
        const CLUB_ID = "group-a162138be57d83c3500191b84a4b325d";
        async function fetchMembers() {
            try {
                const response = await fetch(`https://api.chess.com/pub/club/${CLUB_ID}/members`);
                const data = await response.json();
                let members = (data.weekly || []).sort((a, b) => b.joined - a.joined).slice(0, 5);

                const detailPromises = members.map(async (m) => {
                    const [profile, stats] = await Promise.all([
                        fetch(`https://api.chess.com/pub/player/${m.username}`).then(r => r.json()),
                        fetch(`https://api.chess.com/pub/player/${m.username}/stats`).then(r => r.json())
                    ]);
                    return { ...profile, stats, username: m.username };
                });

                const results = await Promise.all(detailPromises);
                const list = document.getElementById('memberList');
                list.innerHTML = results.map(p => `
                    <a href="https://www.chess.com/member/${p.username}" target="_blank" class="member-card">
                        <div class="avatar-wrapper">
                            <img src="${p.avatar || 'https://www.chess.com/bundles/web/images/noavatar_l.84a92436.gif'}" class="avatar">
                            <div class="status-dot ${p.status === 'online' ? 'online' : 'offline'}"></div>
                        </div>
                        <div style="display:flex; flex-direction:column;">
                            <span class="username">${p.username}</span>
                            <span class="rating-text">⚡ Rapid: ${p.stats.chess_rapid ? p.stats.chess_rapid.last.rating : 'N/A'}</span>
                        </div>
                    </a>
                `).join('');
            } catch (e) { console.error(e); }
        }
        fetchMembers();
    </script>
</body>
</html>
